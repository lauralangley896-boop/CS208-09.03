<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Starting Lineup</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<h1>Starting Lineup</h1>

<form>
  <p>
    <fieldset>
      <legend>Status:</legend>
      <input type="radio" id="statusDraft" name="status" value="Draft">
      <label for="statusDraft">Draft</label>
      <input type="radio" id="statusFinal" name="status" value="Final" checked>
      <label for="statusFinal">Final</label>
    </fieldset>
  </p>

  <p>
    <label for="gameDate">Date:</label>
    <select id="gameDate" name="gameDate">
      <option value="March 20">March 20</option>
      <option value="March 24">March 24</option>
      <option value="April 2">April 2</option>
      <option value="April 6">April 6</option>
      <option value="April 13">April 13</option>
    </select>
  </p>

  <p>
    <fieldset>
      <legend>Players:</legend>
      <input type="checkbox" id="player1" value="Aarav Agarwal">
      <label for="player1">Aarav Agarwal</label><br>
      <input type="checkbox" id="player2" value="Ava Johnson">
      <label for="player2">Ava Johnson</label><br>
      <input type="checkbox" id="player3" value="Julio Ortiz">
      <label for="player3">Julio Ortiz</label><br>
      <input type="checkbox" id="player4" value="Liam Rubio">
      <label for="player4">Liam Rubio</label><br>
      <input type="checkbox" id="player5" value="Emma Witherspoon">
      <label for="player5">Emma Witherspoon</label>
    </fieldset>
  </p>

  <p>
    <input type="submit" value="Submit" id="submitBtn">
  </p>
</form>

<p id="lineupDisplay"></p>
</body>

</html>
